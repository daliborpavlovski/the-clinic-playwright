name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TEST_ENV: local
  BASE_URL: http://localhost
  API_URL: http://localhost/api/v1
  PATIENT_EMAIL: patient@theclinicapp.com
  PATIENT_PASSWORD: Patient1234!
  DOCTOR_EMAIL: doctor@theclinicapp.com
  DOCTOR_PASSWORD: Doctor1234!
  ADMIN_EMAIL: admin@theclinicapp.com
  ADMIN_PASSWORD: Admin1234!

jobs:
  # ── UI Tests (3 browsers × 2 shards = 6 parallel jobs) ──────────────────
  test:
    name: UI Tests — ${{ matrix.browser }} (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
      - name: Checkout the-clinic-playwright
        uses: actions/checkout@v4

      - name: Checkout the-clinic-app
        uses: actions/checkout@v4
        with:
          repository: daliborpavlovski/the-clinic-app
          path: the-clinic-app

      - name: Start Docker Compose
        working-directory: the-clinic-app
        run: |
          docker compose up -d
          echo "Waiting for app to be healthy…"
          timeout 300 bash -c 'until curl -sf http://localhost/health; do sleep 3; done'

      - name: Run migrations and seed database
        working-directory: the-clinic-app
        run: |
          docker compose exec -T backend alembic upgrade head
          docker compose exec -T backend python -m scripts.seed_db

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run UI tests
        run: |
          npx playwright test tests/ui/ \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}-shard${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui-${{ matrix.browser }}-shard${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 7

  # ── API Tests ────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout the-clinic-playwright
        uses: actions/checkout@v4

      - name: Checkout the-clinic-app
        uses: actions/checkout@v4
        with:
          repository: daliborpavlovski/the-clinic-app
          path: the-clinic-app

      - name: Start Docker Compose
        working-directory: the-clinic-app
        run: |
          docker compose up -d
          echo "Waiting for app to be healthy…"
          timeout 300 bash -c 'until curl -sf http://localhost/health; do sleep 3; done'

      - name: Run migrations and seed database
        working-directory: the-clinic-app
        run: |
          docker compose exec -T backend alembic upgrade head
          docker compose exec -T backend python -m scripts.seed_db

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test tests/api/ --project=api

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 7

  # ── Generate & Publish Allure Report ────────────────────────────────────
  report:
    name: Generate and Publish Allure Report
    runs-on: ubuntu-latest
    needs: [test, api-tests]
    if: always()

    steps:
      - name: Checkout the-clinic-playwright
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: merged-allure-results
          merge-multiple: true

      - name: Cache Allure CLI
        uses: actions/cache@v4
        id: allure-cache
        with:
          path: allure-2.27.0
          key: allure-cli-2.27.0

      - name: Install Allure CLI
        if: steps.allure-cache.outputs.cache-hit != 'true'
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar xzf allure.tgz

      - name: Add Allure to PATH
        run: echo "$PWD/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        run: allure generate merged-allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: allure-report
